<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Center Text</title>

  <style>
    body {
      margin: 0;
      width: 100vw;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      background-color: white; /* 배경 흰색 */
      color: black;            /* 글자 검은색 */

      font-size: 50px;         /* 글자 크기 증가 */
      font-weight: bold;       /* 굵게 */
    }
  </style>
</head>

<body>
  <div>Can you tell us why you're entering this space in 3 seconds?<br><br><br>
  3...<br>
  2...<br>
  1...<br><br>
  Hmm.<br>
  If you can't think of a reason, maybe don't go in.
  </div>
</body>
</html>
