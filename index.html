<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Why Are You Entering?</title>

  <style>
    body {
      margin: 0;
      width: 100vw;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: white;
      color: black;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    #page {
      max-width: 850px;
      padding: 40px;
    }

    .question {
      font-size: 42px;
      font-weight: bold;
      margin-bottom: 20px;
      line-height: 1.25;
    }

    #countdown {
      font-size: 72px;
      font-weight: bold;
      margin: 30px 0;
    }

    button {
      display: block;
      width: 500px;
      height: 85px;
      margin: 15px auto;
      font-size: 28px;
      font-weight: bold;
      background-color: white;
      color: black;
      border: 3px solid black;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background-color: #f2f2f2;
    }

    button.selected {
      background-color: #4CAF50;
      color: white;
      border-color: #4CAF50;
    }

    .result-title {
      font-size: 60px;
      font-weight: bold;
    }

    .result-text {
      font-size: 34px;
      margin-top: 22px;
      line-height: 1.45;
    }

    .link-button {
      margin-top: 50px;
      font-size: 22px;
      width: 360px;
      height: 65px;
    }

    a {
      text-decoration: none;
    }

    @media (max-width: 600px) {
      #page {
        padding: 28px;
      }

      .question {
        font-size: 30px;
      }

      #countdown {
        font-size: 62px;
      }

      button {
        width: 90vw;
        height: 72px;
        font-size: 22px;
      }

      .result-title {
        font-size: 48px;
      }

      .result-text {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>
  <div id="page">
    <div class="question">
      Why are you entering this space?
    </div>

    <div id="countdown">3</div>

    <button onclick="selectChoice('class', this)">Class</button>
    <button onclick="selectChoice('studio', this)">Studio Work</button>
    <button onclick="selectChoice('meeting', this)">Meeting</button>
    <button onclick="selectChoice('curious', this)">Just curious</button>
    <button onclick="selectChoice('following', this)">Following someone</button>
  </div>

  <script>
    const page = document.getElementById("page");
    const countdown = document.getElementById("countdown");

    let time = 3;
    let selected = false;

    const timer = setInterval(() => {
      time--;

      if(time > 0){
        countdown.textContent = time;
      }else{
        clearInterval(timer);

        if(!selected){
          showUncertainResult();
        }
      }
    }, 1000);

    function selectChoice(choice, button){
      if(selected) return;

      selected = true;
      clearInterval(timer);

      button.classList.add("selected");

      setTimeout(() => {
        if(choice === "class" || choice === "studio" || choice === "meeting"){
          showClearPurposeResult();
        }else{
          showUncertainResult();
        }
      }, 500);
    }

    function showClearPurposeResult(){
      page.innerHTML = `
        <div class="result-title">Oh.</div>

        <div class="result-text">
          You seem to have a clear reason for being here.
        </div>

        <div class="result-text">
          You must be an ID student.
        </div>

        <a href="protocol.html">
          <button class="link-button">About this Project</button>
        </a>
      `;
    }

    function showUncertainResult(){
      page.innerHTML = `
        <div class="result-title">Hmm.</div>

        <div class="result-text">
          If you are just curious<br>
          or following someone,
        </div>

        <div class="result-text">
          maybe this door is asking you<br>
          to think once more before entering.
        </div>

        <a href="protocol.html">
          <button class="link-button">About this Project</button>
        </a>
      `;
    }
  </script>
</body>
</html>
