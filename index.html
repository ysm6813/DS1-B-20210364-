<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Center Text</title>

  <style>
    body {
      margin: 0;
      width: 100vw;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      background-color: white; /* 배경 흰색 */
      color: black;            /* 글자 검은색 */

      font-size: 60px;         /* 글자 크기 증가 */
      font-weight: bold;       /* 굵게 */
    }
  </style>
</head>

<body>
  <div>You’re not an ID student, are you?</div>
</body>
</html>
