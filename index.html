<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Why Are You Entering?</title>

  <style>
    body {
      margin: 0;
      width: 100vw;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      background-color: white;
      color: black;

      font-family: Arial, sans-serif;
      text-align: center;
    }

    #page {
      max-width: 800px;
      padding: 40px;
    }

    .question {
      font-size: 42px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    #countdown {
      font-size: 70px;
      font-weight: bold;
      margin: 30px 0;
    }

    button {
      display: block;

      width: 500px;
      height: 85px;

      margin: 15px auto;

      font-size: 28px;
      font-weight: bold;

      background-color: white;
      color: black;

      border: 3px solid black;

      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background-color: #f2f2f2;
    }

    button.selected {
      background-color: #4CAF50;
      color: white;
      border-color: #4CAF50;
    }

    .result-title {
      font-size: 60px;
      font-weight: bold;
    }

    .result-text {
      font-size: 36px;
      margin-top: 20px;
      line-height: 1.4;
    }

    .link-button {
      margin-top: 50px;
      font-size: 22px;
      width: 360px;
      height: 65px;
    }

    a {
      text-decoration: none;
    }

    @media (max-width: 600px) {
      .question {
        font-size: 30px;
      }

      #countdown {
        font-size: 60px;
      }

      button {
        width: 90vw;
        height: 70px;
        font-size: 22px;
      }

      .result-title {
        font-size: 48px;
      }

      .result-text {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>
  <div id="page">
    <div class="question">
      Why are you entering this space?
    </div>

    <div id="countdown">3</div>

    <button onclick="selectChoice('class', this)">Class</button>
    <button onclick="selectChoice('studio', this)">Studio Work</button>
    <button onclick="selectChoice('meeting', this)">Meeting</button>
    <button onclick="selectChoice('curious', this)">Just curious</button>
    <button onclick="selectChoice('following', this)">Following someone</button>
  </div>

  <script>
    const page = document.getElementById("page");
    const countdown = document.getElementById("countdown");

    let time = 3;
    let selected = false;

    const timer = setInterval(() => {
      time--;

      if(time > 0){
        countdown.textContent = time;
      }else{
        clearInterval(timer);

        if(!selected){
          showOutsiderResult();
        }
      }
    }, 1000);

    function selectChoice(choice, button){
      if(selected) return;

      selected = true;
      clearInterval(timer);

      button.classList.add("selected");

      setTimeout(() => {
        if(
          choice === "class" ||
          choice === "studio" ||
          choice === "meeting"
        ){
          showIDStudentResult();
        }else{
          showOutsiderResult();
        }
      }, 500);
    }

    function showIDStudentResult(){
      page.innerHTML = `
        <div class="result-title">Oh.</div>

        <div class="result-text">
          You must be an ID student.
        </div>

        <div class="result-text">
          You already know why you are here.
        </div>

        <a href="protocol.html">
          <button class="link-button">About this Project</button>
        </a>
      `;
    }

    function showOutsiderResult(){
      page.innerHTML = `
        <div class="result-title">Hmm.</div>

        <div class="result-text">
          If you are just curious<br>
          or following someone,
        </div>

        <div class="result-text">
          maybe this space is asking you<br>
          to notice why you entered.
        </div>

        <a href="protocol.html">
          <button class="link-button">About this Project</button>
        </a>
      `;
    }
  </script>
</body>
</html>
